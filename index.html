<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Gateway</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Welcome Screen */
#welcome-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #141e30, #243b55);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    transition: 0.7s ease;
    z-index: 2;
}

#welcome-screen h1 {
    font-size: 3rem;
    margin-bottom: 30px;
    letter-spacing: 2px;
}

.welcome-btn {
    padding: 15px 40px;
    border: none;
    border-radius: 50px;
    background: #00c6ff;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.welcome-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #00c6ff;
}

/* Payment Card */
.payment-container {
    width: 350px;
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    color: white;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    transform: translateY(50px);
    opacity: 0;
    transition: 0.8s ease;
}

.payment-container h2 {
    margin-bottom: 20px;
    font-weight: 600;
}

.payment-box {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
    transition: 0.3s;
}

.payment-box:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.05);
}

.payment-box p {
    font-size: 14px;
    opacity: 0.8;
}

.payment-box span {
    font-weight: bold;
    font-size: 16px;
}

.qris-img {
    width: 200px;
    margin-top: 10px;
    border-radius: 10px;
}

.show {
    opacity: 1 !important;
    transform: translateY(0) !important;
}

.hide {
    opacity: 0;
    pointer-events: none;
}
</style>
</head>
<body>

<!-- Welcome Screen -->
<div id="welcome-screen">
    <h1>WELCOME</h1>
    <button class="welcome-btn" onclick="enterSite()">Masuk</button>
</div>

<!-- Payment Section -->
<div class="payment-container" id="payment">
    <h2>Payment Method</h2>

    <div class="payment-box">
        <p>DANA</p>
        <span>082338325478</span>
        <p>A/N: Depan huruf E</p>
    </div>

    <div class="payment-box">
        <p>QRIS</p>
        <img src="https://files.catbox.moe/spirtn.jpg" class="qris-img">
    </div>

</div>

<script>
function enterSite() {
    document.getElementById("welcome-screen").classList.add("hide");
    document.getElementById("payment").classList.add("show");
}
</script>

</body>
</html>
